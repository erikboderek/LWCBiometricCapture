<template>
    <div class="capture-container">
        <div> 
             <h2 class="step-heading">{headingText}
                <template if:true={signatureCaptured}>
                    <lightning-icon icon-name="utility:success" alternative-text="Signature Captured" variant="success" size="small" class="slds-var-m-left_small"></lightning-icon>
                </template>
            </h2>
            
           <lightning-formatted-rich-text 
                value={signatureDisclaimer}
                class="slds-text-body_small slds-var-m-bottom_medium slds-text-color_weak">
            </lightning-formatted-rich-text>
            
            <div class="slds-var-m-bottom_medium">
                <canvas 
                    class="signature-canvas" 
                    onmousedown={handleSignatureStart}
                    onmousemove={handleSignatureDraw}
                    onmouseup={handleSignatureEnd}
                    ontouchstart={handleSignatureStart}
                    ontouchmove={handleSignatureDraw}
                    ontouchend={handleSignatureEnd}>
                </canvas>
            </div>

            <div class="flex-buttons">
                <lightning-button 
                    label="Clear Signature"
                    onclick={handleClearSignature}
                    variant="destructive-text">
                </lightning-button>
            </div>
        </div>
    </div>
</template>
